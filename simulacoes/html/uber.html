<div id="uber-home-screen" class="app-screen">
  <div class="uber-map-area">
    <div class="user-location-pin">
      <span>📍</span>
      <p>Sua localização atual</p>
    </div>
  </div>

  <div class="uber-action-panel">
    <div class="uber-greeting">
      <h2>Boa tarde, viajante!</h2>
    </div>

    <div class="uber-search-box" onclick="uberSim.iniciarBusca()">
      <span class="search-icon">🔍</span>
      <span class="search-text">Para onde?</span>
    </div>

    <div class="uber-saved-places">
      <button class="place-btn">
        <span class="place-icon">🏠</span>
        <span class="place-name">Casa</span>
      </button>
      <button class="place-btn">
        <span class="place-icon">💼</span>
        <span class="place-name">Trabalho</span>
      </button>
    </div>
  </div>

  <nav class="uber-bottom-nav">
    <div class="nav-item active">
      <span class="nav-icon">🚗</span>
      <span>Início</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📋</span>
      <span>Atividade</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">👤</span>
      <span>Conta</span>
    </div>
  </nav>
</div>
